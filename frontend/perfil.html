<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - El Bigodom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span class="yellow">EL</span><span class="black">BIGODOM</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="barbearias.html">Barbearias</a>
                <a href="galeria.html">Galeria</a>
                <div id="user-menu" class="user-menu"></div>
            </div>
        </nav>
    </header>
    
    <main class="container" style="padding: 40px 0;">
        <h1 style="margin-bottom: 24px;">Meu Perfil</h1>
        
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
            <!-- Sidebar -->
            <div class="card">
                <div class="card-header">
                    <h3>Menu</h3>
                </div>
                <div class="card-body">
                    <div class="menu-perfil">
                        <a href="perfil.html" style="display: block; padding: 10px; color: var(--yellow); text-decoration: none;">📋 Meus Dados</a>
                        <a href="meus-agendamentos.html" style="display: block; padding: 10px; color: var(--black); text-decoration: none;">📅 Meus Agendamentos</a>
                        <a href="cupons.html" style="display: block; padding: 10px; color: var(--black); text-decoration: none;">🎫 Meus Cupons</a>
                        <a href="#" onclick="logout()" style="display: block; padding: 10px; color: var(--danger); text-decoration: none;">🚪 Sair</a>
                    </div>
                </div>
            </div>
            
            <!-- Dados do Perfil -->
            <div class="card">
                <div class="card-header">
                    <h3>Dados Pessoais</h3>
                </div>
                <div class="card-body">
                    <form id="perfil-form">
                        <div class="form-group">
                            <label for="nome">Nome completo</label>
                            <input type="text" id="nome" name="nome" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="telefone">Telefone</label>
                            <input type="text" id="telefone" name="telefone" required>
                        </div>
                        
                        <hr style="margin: 20px 0;">
                        
                        <h4 style="margin-bottom: 16px;">Alterar Senha</h4>
                        
                        <div class="form-group">
                            <label for="senha-atual">Senha atual</label>
                            <input type="password" id="senha-atual">
                        </div>
                        
                        <div class="form-group">
                            <label for="nova-senha">Nova senha</label>
                            <input type="password" id="nova-senha">
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmar-senha">Confirmar nova senha</label>
                            <input type="password" id="confirmar-senha">
                        </div>
                        
                        <button type="submit" class="btn-primary">Salvar Alterações</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 El Bigodom - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const usuario = getUsuario();
        
        function carregarDadosPerfil() {
            if (usuario) {
                document.getElementById('nome').value = usuario.nome || '';
                document.getElementById('email').value = usuario.email || '';
                document.getElementById('telefone').value = usuario.telefone || '';
            }
        }
        
        document.getElementById('telefone').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 11) {
                valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
                valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = valor;
            }
        });
        
        document.getElementById('perfil-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const senhaAtual = document.getElementById('senha-atual').value;
            const novaSenha = document.getElementById('nova-senha').value;
            const confirmarSenha = document.getElementById('confirmar-senha').value;
            
            if (novaSenha && novaSenha !== confirmarSenha) {
                mostrarMensagem('As novas senhas não conferem', 'error');
                return;
            }
            
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value
            };
            
            if (novaSenha) {
                dados.senha_atual = senhaAtual;
                dados.nova_senha = novaSenha;
            }
            
            mostrarLoading(true);
            
            try {
                // Chamada para atualizar perfil (endpoint a ser criado no backend)
                // await API.atualizarPerfil(dados);
                
                mostrarMensagem('Perfil atualizado com sucesso!', 'success');
                
                // Limpar campos de senha
                document.getElementById('senha-atual').value = '';
                document.getElementById('nova-senha').value = '';
                document.getElementById('confirmar-senha').value = '';
                
            } catch (error) {
                mostrarMensagem(error.message, 'error');
            } finally {
                mostrarLoading(false);
            }
        });
        
        document.addEventListener('DOMContentLoaded', async () => {
            const autenticado = await verificarAutenticacao(true);
            if (autenticado) {
                atualizarMenuUsuario();
                carregarDadosPerfil();
            }
        });
    </script>
</body>
</html>
