<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhe da Barbearia - El Bigodom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span class="yellow">EL</span><span class="black">BIGODOM</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="barbearias.html">Barbearias</a>
                <a href="galeria.html">Galeria</a>
                <div id="user-menu" class="user-menu"></div>
            </div>
        </nav>
    </header>
    
    <main class="container" style="padding: 40px 0;">
        <div id="barbearia-info"></div>
        
        <h2 style="margin: 40px 0 20px;">Nossos Barbeiros</h2>
        <div class="barbeiros-grid" id="barbeiros-grid">
            <div class="loading-spinner">Carregando barbeiros...</div>
        </div>
        
        <h2 style="margin: 40px 0 20px;">Serviços</h2>
        <div class="servicos-grid" id="servicos-grid" style="display: grid; gap: 16px;"></div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 El Bigodom - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const barbeariaId = urlParams.get('id');
        
        let barbeariaAtual = null;
        
        async function carregarBarbearia() {
            if (!barbeariaId) {
                window.location.href = 'barbearias.html';
                return;
            }
            
            mostrarLoading(true);
            
            try {
                barbeariaAtual = await API.getBarbearia(barbeariaId);
                
                document.getElementById('barbearia-info').innerHTML = `
                    <div class="card">
                        <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                            <div style="flex: 0 0 200px;">
                                <img src="${barbeariaAtual.logo_url || 'assets/img/placeholder.jpg'}" style="width: 100%; border-radius: 12px;">
                            </div>
                            <div style="flex: 1;">
                                <h1>${barbeariaAtual.nome}</h1>
                                <p>📍 ${barbeariaAtual.endereco}</p>
                                <p>📞 ${formatarTelefone(barbeariaAtual.telefone)}</p>
                                <p>📧 ${barbeariaAtual.email}</p>
                                ${barbeariaAtual.descricao ? `<p>${barbeariaAtual.descricao}</p>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                
                await carregarBarbeiros();
                await carregarServicos();
                
            } catch (error) {
                mostrarMensagem('Erro ao carregar barbearia', 'error');
            } finally {
                mostrarLoading(false);
            }
        }
        
        async function carregarBarbeiros() {
            try {
                const barbeiros = await API.listarBarbeiros({ barbearia_id: barbeariaId });
                const container = document.getElementById('barbeiros-grid');
                
                if (barbeiros.length === 0) {
                    container.innerHTML = '<p>Nenhum barbeiro cadastrado ainda.</p>';
                    return;
                }
                
                container.innerHTML = barbeiros.map(barbeiro => `
                    <div class="barbeiro-card">
                        <img class="barbeiro-foto" src="${barbeiro.foto_url || 'assets/img/placeholder.jpg'}" alt="${barbeiro.nome}">
                        <h3 class="barbeiro-nome">${barbeiro.nome}</h3>
                        <p class="barbeiro-especialidade">${barbeiro.especialidade || 'Especialista'}</p>
                        <div class="avaliacao">
                            ${getEstrelas(barbeiro.avaliacao_media || 0)}
                            <span style="color: var(--gray-dark);">(${barbeiro.total_avaliacoes || 0})</span>
                        </div>
                        <a href="agendamento.html?barbeiro_id=${barbeiro.id_barbeiro}&barbearia_id=${barbeariaId}" class="btn-primary" style="margin-top: 12px;">Agendar</a>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error(error);
            }
        }
        
        async function carregarServicos() {
            try {
                const servicos = await API.listarServicos({ barbearia_id: barbeariaId });
                const container = document.getElementById('servicos-grid');
                
                if (servicos.length === 0) {
                    container.innerHTML = '<p>Nenhum serviço cadastrado ainda.</p>';
                    return;
                }
                
                container.innerHTML = servicos.map(servico => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                            <div>
                                <h3>${servico.nome}</h3>
                                ${servico.descricao ? `<p style="color: var(--gray-dark);">${servico.descricao}</p>` : ''}
                                <p style="margin-top: 8px;">⏱️ ${servico.duracao_minutos} min</p>
                            </div>
                            <div style="text-align: right;">
                                <p style="font-size: 1.5rem; font-weight: bold; color: var(--yellow);">${formatarMoeda(servico.preco)}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error(error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            atualizarMenuUsuario();
            carregarBarbearia();
        });
    </script>
</body>
</html>
