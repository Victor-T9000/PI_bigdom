<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - El Bigodom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="index.html" class="logo">
                <span class="yellow">EL</span><span class="black">BIGODOM</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="barbearias.html">Barbearias</a>
                <a href="galeria.html" style="color: var(--yellow);">Galeria</a>
                <div id="user-menu" class="user-menu"></div>
            </div>
        </nav>
    </header>
    
    <main>
        <section style="background: var(--black); color: white; padding: 40px 0; text-align: center;">
            <div class="container">
                <h1>Galeria de <span style="color: var(--yellow);">Cortes</span></h1>
                <p style="margin-top: 8px;">Inspire-se com os melhores estilos</p>
            </div>
        </section>
        
        <section class="container" style="padding: 40px 0;">
            <div class="filtros" style="display: flex; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; align-items: center;">
                <select id="filtro-barbearia" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1;">
                    <option value="">Todas as barbearias</option>
                </select>
                <button id="btn-filtrar" class="btn-primary">Filtrar</button>
            </div>
            
            <div class="galeria-grid" id="galeria-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
                <div class="loading-spinner">Carregando galeria...</div>
            </div>
        </section>
    </main>
    
    <!-- Modal de Visualização -->
    <div id="modal-galeria" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 id="modal-titulo">Corte</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body" style="text-align: center;">
                <img id="modal-imagem" src="" alt="" style="max-width: 100%; border-radius: 8px;">
                <p id="modal-descricao" style="margin-top: 16px;"></p>
                <p id="modal-barbearia" style="color: var(--gray-dark); margin-top: 8px;"></p>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 El Bigodom - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/galeria.js"></script>
    <script>
        let barbeariasLista = [];
        
        async function carregarBarbeariasFiltro() {
            try {
                barbeariasLista = await API.listarBarbearias();
                const select = document.getElementById('filtro-barbearia');
                
                barbeariasLista.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.id_barbearia;
                    option.textContent = b.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar barbearias para filtro', error);
            }
        }
        
        async function carregarGaleria(filtroBarbearia = '') {
            mostrarLoading(true);
            
            try {
                const filtros = {};
                if (filtroBarbearia) filtros.barbearia_id = filtroBarbearia;
                
                const galeria = await API.listarGaleria(filtros);
                const container = document.getElementById('galeria-grid');
                
                if (galeria.length === 0) {
                    container.innerHTML = '<p style="text-align: center;">Nenhuma imagem na galeria ainda.</p>';
                    return;
                }
                
                container.innerHTML = galeria.map(item => `
                    <div class="galeria-item card" data-id="${item.id_galeria}" style="cursor: pointer;">
                        <img src="${item.midia_url || 'assets/img/placeholder.jpg'}" alt="${item.descricao || 'Corte'}" 
                             style="width: 100%; height: 250px; object-fit: cover;">
                        <div class="card-body">
                            <h3>${item.descricao || 'Corte'}</h3>
                            ${item.destaque ? '<span class="badge-yellow" style="display: inline-block; margin-top: 8px;">⭐ Destaque</span>' : ''}
                            <p style="color: var(--gray-dark); font-size: 0.875rem; margin-top: 8px;">
                                👁️ ${item.visualizacoes || 0} visualizações
                            </p>
                        </div>
                    </div>
                `).join('');
                
                // Adicionar evento de clique para abrir modal
                document.querySelectorAll('.galeria-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const id = item.dataset.id;
                        const galeriaItem = galeria.find(g => g.id_galeria == id);
                        abrirModalGaleria(galeriaItem);
                    });
                });
                
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color: var(--danger);">Erro ao carregar galeria</p>';
            } finally {
                mostrarLoading(false);
            }
        }
        
        function abrirModalGaleria(item) {
            const barbearia = barbeariasLista.find(b => b.id_barbearia == item.id_barbearia);
            
            document.getElementById('modal-titulo').textContent = item.descricao || 'Corte';
            document.getElementById('modal-imagem').src = item.midia_url || 'assets/img/placeholder.jpg';
            document.getElementById('modal-descricao').textContent = item.descricao || 'Sem descrição';
            document.getElementById('modal-barbearia').textContent = barbearia ? `📍 ${barbearia.nome}` : '';
            
            document.getElementById('modal-galeria').classList.add('active');
        }
        
        document.getElementById('btn-filtrar').addEventListener('click', () => {
            const barbeariaId = document.getElementById('filtro-barbearia').value;
            carregarGaleria(barbeariaId);
        });
        
        document.querySelector('#modal-galeria .close-modal').onclick = () => {
            document.getElementById('modal-galeria').classList.remove('active');
        };
        
        document.addEventListener('DOMContentLoaded', async () => {
            atualizarMenuUsuario();
            await carregarBarbeariasFiltro();
            await carregarGaleria();
        });
    </script>
</body>
</html>
