<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearias - El BigDom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="/" class="logo">
                <span class="yellow">EL</span><span class="black">BIGDOM</span>
            </a>
            <div class="nav-links">
                <a href="/">Início</a>
                <a href="barbearias.html" style="color: var(--yellow);">Barbearias</a>
                <a href="galeria.html">Galeria</a>
                <div id="user-menu" class="user-menu"></div>
            </div>
        </nav>
    </header>
    
    <main>
        <section style="background: var(--black); color: white; padding: 40px 0; text-align: center;">
            <div class="container">
                <h1>Encontre a <span style="color: var(--yellow);">Barbearia</span> perfeita</h1>
                <p style="margin-top: 8px;">As melhores barbearias estão aqui</p>
            </div>
        </section>
        
        <section class="container">
            <div class="filtros" style="display: flex; gap: 16px; margin: 30px 0; flex-wrap: wrap;">
                <input type="text" id="busca" placeholder="Buscar barbearia..." style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                <input type="text" id="cidade" placeholder="Cidade..." style="padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
                <button id="btn-buscar" class="btn-primary">Buscar</button>
            </div>
            
            <div class="barbearias-grid" id="barbearias-grid">
                <div class="loading-spinner">Carregando barbearias...</div>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 El BigDom - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/barbearias.js"></script>
    <script>
        let filtrosAtuais = {};
        
        async function carregarBarbeariasComFiltros() {
            mostrarLoading(true);
            
            try {
                const barbearias = await API.listarBarbearias(filtrosAtuais);
                const container = document.getElementById('barbearias-grid');
                
                if (barbearias.length === 0) {
                    container.innerHTML = '<p style="text-align: center;">Nenhuma barbearia encontrada.</p>';
                    return;
                }
                
                container.innerHTML = barbearias.map(barbearia => `
                    <div class="barbearia-card">
                        <div class="barbearia-image">
                            <img src="${barbearia.logo_url || 'assets/img/placeholder.jpg'}" alt="${barbearia.nome}">
                        </div>
                        <div class="barbearia-info">
                            <h3 class="barbearia-nome">${barbearia.nome}</h3>
                            <p class="barbearia-endereco">📍 ${barbearia.endereco}</p>
                            <p class="barbearia-endereco">📞 ${formatarTelefone(barbearia.telefone)}</p>
                            <a href="/barbearia-detalhe?id=${barbearia.id_barbearia}"  class="btn-primary" style="margin-top: 12px; display: inline-block;">Ver Serviços</a>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                mostrarMensagem('Erro ao carregar barbearias', 'error');
            } finally {
                mostrarLoading(false);
            }
        }
        
        document.getElementById('btn-buscar').addEventListener('click', () => {
            filtrosAtuais = {
                busca: document.getElementById('busca').value,
                cidade: document.getElementById('cidade').value
            };
            carregarBarbeariasComFiltros();
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            atualizarMenuUsuario();
            carregarBarbeariasComFiltros();
        });
    </script>
</body>
</html>
