<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - El BigDom</title>
    <link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="/static/js/config.js"></script>
<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/api.js"></script>
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="/" class="logo">
                <span class="yellow">EL</span><span class="black">BIGDOM</span>
            </a>
            <div class="nav-links">
                <a href="/">Início</a>
                <a href="barbearias.html">Barbearias</a>
                <a href="galeria.html">Galeria</a>
                <a href="login.html" class="btn-outline">Entrar</a>
                <a href="cadastro.html" class="btn-primary">Cadastrar</a>
            </div>
        </nav>
    </header>
    
    <main class="container" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 60px 0;">
        <div class="card" style="max-width: 500px; width: 100%;">
            <div class="card-header" style="text-align: center;">
                <h2>Crie sua conta</h2>
                <p style="color: var(--yellow);">Comece a agendar seus horários</p>
            </div>
            <div class="card-body">
                <form id="cadastro-form">
                    <div class="form-group">
                        <label for="nome">Nome completo</label>
                        <input type="text" id="nome" name="nome" required placeholder="Seu nome">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" required placeholder="seu@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="text" id="telefone" name="telefone" required placeholder="(11) 99999-9999">
                    </div>
                    
                    <div class="form-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" name="senha" required placeholder="••••••••">
                    </div>
                    
                    <div class="form-group">
                        <label for="senha-confirm">Confirmar senha</label>
                        <input type="password" id="senha-confirm" name="senha-confirm" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn-primary btn-block">Cadastrar</button>
                </form>
                
                <div style="text-align: center; margin-top: 20px;">
                    <p>Já tem uma conta? <a href="login.html" style="color: var(--yellow);">Faça login</a></p>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 El BigDom - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('cadastro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const senha = document.getElementById('senha').value;
            const senhaConfirm = document.getElementById('senha-confirm').value;
            
            if (senha !== senhaConfirm) {
                mostrarMensagem('As senhas não conferem', 'error');
                return;
            }
            
            const usuario = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                senha: senha
            };
            
            mostrarLoading(true);
            
            try {
                await API.registrar(usuario);
                mostrarMensagem('Cadastro realizado com sucesso! Faça login.');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                mostrarMensagem(error.message, 'error');
            } finally {
                mostrarLoading(false);
            }
        });
        
        // Se já estiver logado, redireciona
        if (isAutenticado()) {
            window.location.href = 'index.html';
        }
        
        // Máscara de telefone
        document.getElementById('telefone').addEventListener('input', function(e) {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length <= 11) {
                valor = valor.replace(/(\d{2})(\d)/, '($1) $2');
                valor = valor.replace(/(\d{5})(\d)/, '$1-$2');
                e.target.value = valor;
            }
        });
    </script>
</body>
</html>
