<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações - El BigDom</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="navbar container">
            <a href="/" class="logo">
                <span class="yellow">EL</span><span class="black">BIGDOM</span>
            </a>
            <div class="nav-links">
                <a href="/">Início</a>
                <a href="barbearias.html">Barbearias</a>
                <a href="galeria.html">Galeria</a>
                <div id="user-menu" class="user-menu"></div>
            </div>
        </nav>
    </header>
    
    <main class="container" style="padding: 40px 0;">
        <h1 style="margin-bottom: 24px;">Avaliações dos Barbeiros</h1>
        
        <div class="filtros" style="display: flex; gap: 16px; margin-bottom: 30px; flex-wrap: wrap;">
            <select id="filtro-barbearia" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1;">
                <option value="">Todas as barbearias</option>
            </select>
            <select id="filtro-barbeiro" style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; flex: 1;">
                <option value="">Todos os barbeiros</option>
            </select>
            <button id="btn-filtrar" class="btn-primary">Filtrar</button>
        </div>
        
        <div id="avaliacoes-container"></div>
    </main>
    
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 El BigDom - Todos os direitos reservados</p>
        </div>
    </footer>
    
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        let barbeirosLista = [];
        let barbeariasLista = [];
        
        async function carregarFiltros() {
            try {
                barbeariasLista = await API.listarBarbearias();
                barbeirosLista = await API.listarBarbeiros();
                
                const selectBarbearia = document.getElementById('filtro-barbearia');
                const selectBarbeiro = document.getElementById('filtro-barbeiro');
                
                barbeariasLista.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.id_barbearia;
                    option.textContent = b.nome;
                    selectBarbearia.appendChild(option);
                });
                
                barbeirosLista.forEach(b => {
                    const option = document.createElement('option');
                    option.value = b.id_barbeiro;
                    option.textContent = `${b.nome} - ${b.barbearia_nome || ''}`;
                    selectBarbeiro.appendChild(option);
                });
            } catch (error) {
                console.error('Erro ao carregar filtros', error);
            }
        }
        
        async function carregarAvaliacoes() {
            const barbeiroId = document.getElementById('filtro-barbeiro').value;
            
            if (!barbeiroId) {
                document.getElementById('avaliacoes-container').innerHTML = '<div class="card"><div class="card-body"><p>Selecione um barbeiro para ver as avaliações.</p></div></div>';
                return;
            }
            
            mostrarLoading(true);
            
            try {
                const avaliacoes = await API.getAvaliacoesBarbeiro(barbeiroId);
                const container = document.getElementById('avaliacoes-container');
                
                if (avaliacoes.length === 0) {
                    container.innerHTML = '<div class="card"><div class="card-body"><p>Este barbeiro ainda não tem avaliações.</p></div></div>';
                    return;
                }
                
                // Calcular média
                let soma = 0;
                avaliacoes.forEach(a => soma += a.avaliacao);
                const media = (soma / avaliacoes.length).toFixed(1);
                
                container.innerHTML = `
                    <div class="card" style="margin-bottom: 24px; text-align: center;">
                        <div class="card-body">
                            <h2>Média de Avaliações</h2>
                            <div style="font-size: 3rem; color: var(--yellow);">${media}</div>
                            <div>${getEstrelas(media)}</div>
                            <p>${avaliacoes.length} avaliações</p>
                        </div>
                    </div>
                    ${avaliacoes.map(av => `
                        <div class="card" style="margin-bottom: 16px;">
                            <div class="card-body">
                                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                                    <div>
                                        <strong>${av.cliente_nome}</strong>
                                        <div>${getEstrelas(av.avaliacao)}</div>
                                        <p style="margin-top: 8px;">Serviço: ${av.servico_nome}</p>
                                        ${av.recomendacoes ? `<p style="margin-top: 8px; color: var(--gray-dark);">"${av.recomendacoes}"</p>` : ''}
                                    </div>
                                    <div style="font-size: 0.875rem; color: var(--gray-dark);">
                                        ${formatarData(av.data_agendamento)}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                `;
                
            } catch (error) {
                mostrarMensagem('Erro ao carregar avaliações', 'error');
            } finally {
                mostrarLoading(false);
            }
        }
        
        document.getElementById('btn-filtrar').addEventListener('click', carregarAvaliacoes);
        
        document.addEventListener('DOMContentLoaded', async () => {
            atualizarMenuUsuario();
            await carregarFiltros();
            await carregarAvaliacoes();
        });
    </script>
</body>
</html>
